<section class="bg-[var(--color-primary)] text-white py-20 px-6 text-center">
    <h1 class="text-4xl font-bold mb-4">Bienvenido a TiendaVirtual</h1>
    <p class="text-lg text-gray-300 mb-8">Juegos de mesa, videojuegos, libros y mucho más</p>
    <a routerLink="/catalog"
        class="bg-[var(--color-accent)] hover:bg-[var(--color-accent-hover)] px-8 py-3 rounded-lg text-lg font-semibold transition-colors">
        Ver catálogo
    </a>
</section>

<section class="max-w-5xl mx-auto px-6 py-16">
    <h2 class="text-2xl font-bold text-center mb-10 text-[var(--color-primary)]">¿Qué encontrarás aquí?</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        @for (category of categories; track category.name) {
        <div class="bg-white rounded-lg shadow p-6 text-center hover:shadow-md transition-shadow">
            <span class="text-4xl">{{ category.icon }}</span>
            <p class="mt-3 font-semibold text-[var(--color-text)]">{{ category.name }}</p>
        </div>
        }
    </div>
</section>
