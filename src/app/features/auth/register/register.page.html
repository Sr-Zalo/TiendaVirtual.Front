<div class="min-h-screen flex items-center justify-center bg-[var(--color-bg)] px-4">
  <div class="rounded-2xl shadow-sm p-8 w-full max-w-md" style="background: var(--color-surface)">
    <h1 class="text-2xl font-bold text-center mb-6 text-[var(--color-primary)]">{{ 'auth.register.title' | transloco }}
    </h1>

    @if (error) {
    <div class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl mb-4">{{ error }}</div>
    }

    <div class="flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-[var(--color-text)] mb-1">{{ 'auth.register.name' | transloco
          }}</label>
        <input type="text" [(ngModel)]="name" [placeholder]="'auth.register.namePlaceholder' | transloco"
          class="w-full border border-[var(--color-border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[var(--color-primary)]" />
      </div>
      <div>
        <label class="block text-sm font-medium text-[var(--color-text)] mb-1">{{ 'auth.register.surname' | transloco
          }}</label>
        <input type="text" [(ngModel)]="surname" [placeholder]="'auth.register.surnamePlaceholder' | transloco"
          class="w-full border border-[var(--color-border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[var(--color-primary)]" />
      </div>
      <div>
        <label class="block text-sm font-medium text-[var(--color-text)] mb-1">{{ 'auth.register.email' | transloco
          }}</label>
        <input type="email" [(ngModel)]="email" [placeholder]="'auth.register.emailPlaceholder' | transloco"
          class="w-full border border-[var(--color-border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[var(--color-primary)]" />
      </div>
      <div>
        <label class="block text-sm font-medium text-[var(--color-text)] mb-1">{{ 'auth.register.password' | transloco
          }}</label>
        <input type="password" [(ngModel)]="password" [placeholder]="'auth.register.passwordPlaceholder' | transloco"
          class="w-full border border-[var(--color-border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[var(--color-primary)]" />
      </div>
      <button (click)="submit()" [disabled]="loading"
        class="bg-[var(--color-primary)] hover:bg-[var(--color-primary-hover)] text-white py-3 rounded-xl font-semibold transition-colors disabled:opacity-50">
        {{ loading ? ('auth.register.submitting' | transloco) : ('auth.register.submit' | transloco) }}
      </button>
    </div>

    <p class="text-center text-sm text-[var(--color-text-secondary)] mt-4">
      {{ 'auth.register.hasAccount' | transloco }}
      <a routerLink="/login" class="text-[var(--color-primary)] hover:underline">{{ 'auth.register.login' | transloco
        }}</a>
    </p>
  </div>
</div>
