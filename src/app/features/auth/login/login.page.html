<div class="min-h-screen flex items-center justify-center bg-[var(--color-bg)] px-4">
  <div class="bg-white rounded-lg shadow p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6 text-[var(--color-primary)]">Iniciar sesión</h1>

    @if (error) {
      <div class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded mb-4">{{ error }}</div>
    }

    <div class="flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" [(ngModel)]="email"
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[var(--color-accent)]"
               placeholder="tu@email.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input type="password" [(ngModel)]="password"
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[var(--color-accent)]"
               placeholder="••••••••" />
      </div>
      <button (click)="submit()" [disabled]="loading"
              class="bg-[var(--color-accent)] hover:bg-[var(--color-accent-hover)] text-white py-2 rounded font-semibold transition-colors disabled:opacity-50">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </div>

    <p class="text-center text-sm text-gray-500 mt-4">
      ¿No tienes cuenta?
      <a routerLink="/register" class="text-[var(--color-accent)] hover:underline">Regístrate</a>
    </p>
  </div>
</div>
