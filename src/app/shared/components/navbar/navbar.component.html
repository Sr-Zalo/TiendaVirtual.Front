<nav class="bg-[var(--color-primary)] text-white px-6 py-4 flex items-center justify-between shadow-md">

  <a routerLink="/" class="text-xl font-bold tracking-wide hover:text-[var(--color-accent)] transition-colors">
    🎲 TiendaVirtual
  </a>

  <div class="flex items-center gap-6">
    <a routerLink="/" routerLinkActive="text-[var(--color-accent)]"
       [routerLinkActiveOptions]="{exact: true}"
       class="hover:text-[var(--color-accent)] transition-colors">
      Inicio
    </a>
    <a routerLink="/catalog" routerLinkActive="text-[var(--color-accent)]"
       class="hover:text-[var(--color-accent)] transition-colors">
      Catálogo
    </a>
  </div>

  <div class="flex items-center gap-3">
    @if (authService.isLoggedIn()) {
      <a routerLink="/cart" class="relative hover:text-[var(--color-accent)] transition-colors">
        🛒
        @if (cartCount > 0) {
          <span class="absolute -top-2 -right-2 bg-[var(--color-accent)] text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
            {{ cartCount }}
          </span>
        }
      </a>
      <a routerLink="/orders"
         class="hover:text-[var(--color-accent)] transition-colors text-sm">
        Mis pedidos
      </a>
      @if (authService.isAdmin()) {
        <a routerLink="/admin/product/new"
           class="hover:text-[var(--color-accent)] transition-colors text-sm">
          + Producto
        </a>
      }
      <span class="text-sm text-gray-300">{{ authService.currentUser()?.name }}</span>
      <button (click)="logout()"
              class="bg-[var(--color-accent)] hover:bg-[var(--color-accent-hover)] px-4 py-2 rounded text-sm transition-colors">
        Cerrar sesión
      </button>
    } @else {
      <a routerLink="/login"
         class="bg-[var(--color-accent)] hover:bg-[var(--color-accent-hover)] px-4 py-2 rounded text-sm transition-colors">
        Iniciar sesión
      </a>
    }
  </div>

</nav>
