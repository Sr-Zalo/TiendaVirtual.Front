<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>PlayVault</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="dado.ico">
</head>

<body>
  <app-root></app-root>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const icons = {
        'ph-magnifying-glass': 'PhMagnifyingGlass',
        'ph-shopping-cart': 'PhShoppingCart',
        'ph-user': 'PhUser',
        'ph-sign-out': 'PhSignOut',
        'ph-star': 'PhStar',
        'ph-fire': 'PhFire',
        'ph-trend-up': 'PhTrendUp',
        'ph-caret-left': 'PhCaretLeft',
        'ph-caret-right': 'PhCaretRight',
        'ph-game-controller': 'PhGameController',
        'ph-television-simple': 'PhTelevisionSimple',
        'ph-book-open': 'PhBookOpen',
        'ph-puzzle-piece': 'PhPuzzlePiece',
        'ph-tag': 'PhTag',
        'ph-funnel': 'PhFunnel',
        'ph-x': 'PhX',
        'ph-arrow-left': 'PhArrowLeft',
        'ph-trash': 'PhTrash',
        'ph-users': 'PhUsers',
        'ph-clock': 'PhClock',
        'ph-globe': 'PhGlobe',
        'ph-devices': 'PhDevices',
        'ph-book': 'PhBook',
        'ph-package': 'PhPackage',
        'ph-check': 'PhCheck',
        'ph-pencil': 'PhPencil',
        'ph-sparkle': 'PhSparkle',
        'ph-question': 'PhQuestion',
        'ph-warning': 'PhWarning',
        'ph-moon': 'PhMoon',
        'ph-sun': 'PhSun',
        'ph-dice-five': 'PhDiceFive',
        'ph-gamepad': 'PhGamepad',
        'ph-storefront': 'PhStorefront',
      };

      for (const [name, className] of Object.entries(icons)) {
        if (window[className] && !customElements.get(name)) {
          customElements.define(name, window[className]);
        }
      }
    });
  </script>
</body>

</html>
