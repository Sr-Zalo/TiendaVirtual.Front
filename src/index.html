<!doctype html>
<html lang="es">

<head>
  <script type="module">
    import * as Ph from 'https://unpkg.com/@phosphor-icons/webcomponents@2.1.1/dist/index.js';

    const icons = {
      'ph-magnifying-glass': Ph.PhMagnifyingGlass,
      'ph-shopping-cart': Ph.PhShoppingCart,
      'ph-user': Ph.PhUser,
      'ph-sign-out': Ph.PhSignOut,
      'ph-star': Ph.PhStar,
      'ph-fire': Ph.PhFire,
      'ph-trend-up': Ph.PhTrendUp,
      'ph-caret-left': Ph.PhCaretLeft,
      'ph-caret-right': Ph.PhCaretRight,
      'ph-game-controller': Ph.PhGameController,
      'ph-television-simple': Ph.PhTelevisionSimple,
      'ph-book-open': Ph.PhBookOpen,
      'ph-puzzle-piece': Ph.PhPuzzlePiece,
      'ph-tag': Ph.PhTag,
      'ph-funnel': Ph.PhFunnel,
      'ph-x': Ph.PhX,
      'ph-arrow-left': Ph.PhArrowLeft,
      'ph-trash': Ph.PhTrash,
      'ph-users': Ph.PhUsers,
      'ph-clock': Ph.PhClock,
      'ph-globe': Ph.PhGlobe,
      'ph-devices': Ph.PhDevices,
      'ph-book': Ph.PhBook,
      'ph-package': Ph.PhPackage,
      'ph-check': Ph.PhCheck,
      'ph-pencil': Ph.PhPencil,
      'ph-sparkle': Ph.PhSparkle,
      'ph-question': Ph.PhQuestion,
      'ph-warning': Ph.PhWarning,
      'ph-moon': Ph.PhMoon,
      'ph-sun': Ph.PhSun,
      'ph-dice-five': Ph.PhDiceFive,
      'ph-gamepad': Ph.PhGamepad
    };

    for (const [name, constructor] of Object.entries(icons)) {
      if (constructor && !customElements.get(name)) {
        customElements.define(name, constructor);
      }
    }
  </script>
  <meta charset="utf-8">
  <title>PlayVault</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="dado.ico">
</head>

<body>
  <app-root></app-root>
</body>

</html>
